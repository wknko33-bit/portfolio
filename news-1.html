<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEWS | NAKAO AO</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="images/ファビコン.png" />

    <!-- HOME画面の美しい左寄せラインに合わせた専用スタイル -->
    <style>
      /* 全体のコンテンツ幅をHOMEのABOUTやNEWSと完全に一致させる */
      .news-detail-container {
        max-width: 900px;
        margin: 80px auto 120px;
        padding: 0 20px;
      }

      /* 記事のヘッダー（日付とタイトル） */
      .news-detail-header {
        border-bottom: 1px solid #eee;
        padding-bottom: 20px;
        margin-bottom: 40px;
      }

      .news-detail-date {
        font-size: 13px;
        color: #888;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 12px;
      }

      .news-detail-title {
        font-size: 20px;
        font-weight: normal;
        letter-spacing: 0.05em;
        line-height: 1.5;
        color: #111;
        margin: 0;
      }

      /* 記事の本文エリア（読みやすさを重視） */
      .news-detail-body {
        font-size: 14px;
        line-height: 1.8;
        color: #333;
        letter-spacing: 0.03em;
      }

      .news-detail-body p {
        margin-bottom: 24px;
      }

      /* 記事の中に画像を載せたい場合（自動で綺麗に収まります） */
      .news-detail-body img {
        max-width: 100%;
        height: auto;
        margin: 30px 0;
        display: block;
      }

      /* 下部の「back to home」エリア */
      .back-links-area {
        text-align: center;
        margin-top: 80px;
        padding-top: 30px;
        border-top: 1px solid #eee;
      }

      .news-back-link {
        font-size: 13px;
        letter-spacing: 0.05em;
        color: #333;
        text-decoration: none;
        text-transform: uppercase;
        border-bottom: 1px solid #333;
        padding-bottom: 2px;
        transition: opacity 0.3s;
      }

      .news-back-link:hover {
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <!-- ヘッダー：HOME画面と完全に共通のデザイン -->
    <header class="site-header">
      <div class="logo"><a href="home.html">NAKAO AO</a></div>
      <nav class="nav-links">
        <a href="illustration.html">ILLUSTRATION</a>
        <a href="photo.html">PHOTO</a>
        <a href="logo.html">LOGO</a>
        <a href="merch.html">MERCH</a>
      </nav>
    </header>

    <!-- メインコンテンツ：ここが記事の中身になります -->
    <main class="news-detail-container">
      <article>
        <!-- 記事のタイトル部分 -->
        <header class="news-detail-header">
          <time class="news-detail-date">2026.06.15</time>
          <h2 class="news-detail-title">
            ホームページにNEWSセクションを追加しました。
          </h2>
        </header>

        <!-- 記事の本文（ここを自由に書き換えてください） -->
        <div class="news-detail-body">
          <p>いつも NAKAO AO をご覧いただきありがとうございます。</p>
          <p>
            この度、ポートフォリオサイトに新しく「NEWS」セクションを新設いたしました。
          </p>
          <p>
            今後は展示会のスケジュールやグッズの販売情報、その他のお知らせをこちらで発信していきます。どうぞよろしくお願いいたします。
          </p>

          <!-- もし個展のフライヤー画像などを載せたい場合は、下のコメントアウトを解除して使えます -->
          <!-- <img src="images/news-image.jpg" alt="告知画像"> -->
        </div>
      </article>

      <!-- HOMEへ戻るボタン -->
      <div class="back-links-area">
        <a href="index.html" class="news-back-link">back to home</a>
      </div>
    </main>

    <!-- フッター -->
    <footer class="site-footer">
      <p>&copy; 2026 NAKAO AO</p>
    </footer>
  </body>
</html>
